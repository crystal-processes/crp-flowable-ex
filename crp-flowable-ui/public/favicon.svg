<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Crystal facets gradient -->
        <linearGradient id="facetLight" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.85"/>
            <stop offset="100%" stop-color="#EAF6FF" stop-opacity="0.35"/>
        </linearGradient>

        <linearGradient id="facetDark" x1="100%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#F7FCFF" stop-opacity="0.6"/>
            <stop offset="100%" stop-color="#DDEEFF" stop-opacity="0.25"/>
        </linearGradient>
    </defs>

    <g>
        <!-- Left facet -->
        <polygon points="64 10 28 44 64 118"
                 fill="url(#facetDark)"/>

        <!-- Right facet -->
        <polygon points="64 10 100 44 64 118"
                 fill="url(#facetLight)"/>

        <!-- Top highlight ridge -->
        <polygon points="64 10 28 44 100 44"
                 fill="#FFFFFF"
                 opacity="0.35"/>

        <!-- Inner refraction line -->
        <line x1="64" y1="14" x2="64" y2="116"
              stroke="#FFFFFF"
              stroke-opacity="0.25"
              stroke-width="1"/>
    </g>
</svg>
